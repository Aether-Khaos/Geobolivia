<!DOCTYPE html>
<html>
<head>
    <title>Registro - GeoBolivia </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        
        .register-container {
            background: rgba(30, 30, 40, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            width: 380px;
            border: 1px solid #444;
        }
        
        h2 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #444;
            border-radius: 8px;
            background: #1e1e2e;
            color: #e0e0e0;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
            transition: all 0.3s ease;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .error {
            color: #f87171;
            text-align: center;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(248, 113, 113, 0.1);
            border-radius: 8px;
            border-left: 3px solid #f87171;
        }
        
        .login-link, .back-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .login-link a, .back-link a {
            color: #60a5fa;
            text-decoration: none;
            transition: 0.3s;
        }
        
        .login-link a:hover, .back-link a:hover {
            color: #93c5fd;
            text-decoration: underline;
        }
        
        .icon {
            text-align: center;
            font-size: 48px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="icon">📝</div>
        <h2>Crear Cuenta</h2>
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <input type="text" name="username" placeholder="👤 Usuario" required>
            <input type="email" name="email" placeholder="📧 Correo electrónico">
            <input type="password" name="password" placeholder="🔒 Contraseña" required>
            <button type="submit">Registrarse</button>
        </form>
        <div class="login-link">
            ¿Ya tienes cuenta? <a href="{% url 'login' %}">Inicia sesión aquí</a>
        </div>
        <div class="back-link">
            <a href="{% url 'dashboard' %}">← Volver al Dashboard</a>
        </div>
    </div>
</body>
</html>
