<!DOCTYPE html>
<html>
<head>
    <title>GeoBolivia Mapa</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial; margin: 0; padding: 20px; }
        #container { display: flex; gap: 20px; }
        #map { height: 500px; width: 60%; }
        #panel { width: 35%; }
        select, button { padding: 10px; margin: 5px; width: 100%; }
        .grafico { margin-top: 20px; background: #f5f5f5; padding: 15px; }
        canvas { max-height: 300px; }
    </style>
</head>
<body>
    <h1>GeoBolivia - Cambio Climático</h1>
    
    <div id="container">
        <div id="map"></div>
        <div id="panel">
            <input type="text" id="busqueda" placeholder="Buscar municipio..." />
            <button onclick="buscar()">Buscar</button>
            <ul id="resultados"></ul>
            <select id="categoria">
                <option value="agropecuario">Agropecuario</option>
                <option value="agua">Agua</option>
                <option value="bosques">Bosques</option>
            </select>
            <button onclick="actualizar()">Actualizar</button>
            
            <div class="grafico">
                <canvas id="grafico"></canvas>
            </div>
        </div>
    </div>

    <script>
        // Mapa
        var map = L.map('map').setView([-16.5, -64.5], 6);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);
        
        var chart;
        
        function actualizar() {
            var categoria = document.getElementById('categoria').value;
            
            fetch(`/api/indicadores/?categoria=${categoria}`)
                .then(response => response.json())
                .then(data => {
                    var labels = Object.keys(data);
                    var valores = labels.map(l => {
                        var sum = data[l].reduce((a,b) => a + b.valor, 0);
                        return sum / data[l].length;
                    });
                    
                    if (chart) chart.destroy();
                    
                    var ctx = document.getElementById('grafico').getContext('2d');
                    chart = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: categoria,
                                data: valores,
                                backgroundColor: 'rgba(54, 162, 235, 0.5)'
                            }]
                        }
                    });
                });
        }
        
        actualizar();
        async function buscar() {
    let texto = document.getElementById("busqueda").value;

    let res = await fetch(`/buscar/?q=${texto}`);
    let data = await res.json();

    let lista = document.getElementById("resultados");
    lista.innerHTML = "";

    data.forEach(item => {
        let li = document.createElement("li");
        li.textContent = item.municipio;

        li.onclick = function() {
            centrarMapa(item.municipio);
        };

        lista.appendChild(li);
    });
}
    const coordenadas = {
    "La Paz": [-16.5, -68.1],
    "Santa Cruz": [-17.8, -63.2],
    "Cochabamba": [-17.4, -66.1],
    "Oruro": [-17.9, -67.1],
    "Potosí": [-19.6, -65.8]
};

function centrarMapa(nombre) {
    let coords = coordenadas[nombre];

    if (coords) {
        map.setView(coords, 8);
    } else {
        alert("Ubicación no encontrada");
    }
}
    </script>
</body>
</html>
