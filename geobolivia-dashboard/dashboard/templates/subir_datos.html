<!DOCTYPE html>
<html>
<head>
    <title>Subir Datos - GeoBolivia </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(30, 30, 40, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid #444;
        }
        
        h2 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #a0a0b0;
            font-weight: bold;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #444;
            border-radius: 8px;
            background: #1e1e2e;
            color: #e0e0e0;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-right: 10px;
            transition: all 0.3s ease;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .cancel-btn {
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
        }
        
        .cancel-btn:hover {
            box-shadow: 0 5px 15px rgba(220, 38, 38, 0.4);
        }
        
        .message {
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .success {
            background: rgba(74, 222, 128, 0.1);
            color: #4ade80;
            border-left: 3px solid #4ade80;
        }
        
        .error {
            background: rgba(248, 113, 113, 0.1);
            color: #f87171;
            border-left: 3px solid #f87171;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .icon {
            text-align: center;
            font-size: 48px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📤</div>
        <h2>Subir Nuevos Datos Climáticos</h2>
        
        {% if messages %}
            {% for message in messages %}
                <div class="message {% if message.tags %}{{ message.tags }}{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label> Categoría:</label>
                <select name="categoria" required>
                    <option value="">Seleccionar categoría</option>
                    {% for categoria in categorias %}
                        <option value="{{ categoria }}">{{ categoria }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label> Indicador:</label>
                <select name="indicador" required>
                    <option value="">Seleccionar indicador</option>
                    {% for indicador in indicadores %}
                        <option value="{{ indicador }}">{{ indicador }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label> Municipio:</label>
                <select name="municipio" required>
                    <option value="">Seleccionar municipio</option>
                    {% for municipio in municipios %}
                        <option value="{{ municipio }}">{{ municipio }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label> Valor:</label>
                <input type="number" step="any" name="valor" placeholder="Ej: 25.5" required>
            </div>
            
            <div class="button-group">
                <button type="submit"> Subir Datos</button>
                <a href="{% url 'dashboard' %}" style="text-decoration: none;">
                    <button type="button" class="cancel-btn">❌ Cancelar</button>
                </a>
            </div>
        </form>
    </div>
</body>
</html>
